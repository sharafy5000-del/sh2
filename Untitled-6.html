<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>باقات الأسعار</title>
    <link rel="stylesheet" type="text/css" href="66.css">
</head>
<body dir="rtl">
    <div class="pricing-container">
        <div class="pricing-card">
            <div class="plan-name">أساسي</div>
            <div class="price">$29<span>/شهر</span></div>
            <ul class="features">
                <li> 5 مشاريع</li>
                <li> 10GB مساحة</li>
                <li> دعم البريد الإلكتروني</li>
                <li> تحليلات متقدمة</li></ul>
                <button class="btn-plan">اختر الخطة</button>
            </div>
        <div class="pricing-card featured">
            <div class="plan-name">احترافي</div>
            <div class="price">$79<span>/شهر</span></div>
            <ul class="features">
                <li> مشاريع غير محدودة</li>
                <li> 100GB مساحة</li>
                <li> دعم 24/7</li>
                <li> تحليلات متقدمة</li>
            </ul><button class="btn-plan">اختر الخطة</button></div>
        <div class="pricing-card">
            <div class="plan-name">شركات</div>
            <div class="price">$199<span>/شهر</span></div>
            <ul class="features">
                <li> حلول مخصصة</li>
                <li> مساحة غير محدودة</li>
                <li> دعم أولوية</li>
                <li> مدير حساب مخصص</li>
            </ul><button class="btn-plan">اختر الخطة</button></div>
    </div>
</body>
</html>
